<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cylindrical Pillar G-code Generator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #111827;
  color: #d1d5db;
  height: 100vh;
  overflow: hidden;
}

.app {
  display: grid;
  grid-template-columns: 320px 1fr;
  height: 100vh;
}

/* ---- Sidebar ---- */
.sidebar {
  background: #1f2937;
  border-right: 1px solid #374151;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.app-title {
  font-size: 12px;
  font-weight: 700;
  color: #34d399;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  padding-bottom: 10px;
  border-bottom: 1px solid #374151;
}

.section {
  background: #111827;
  border: 1px solid #374151;
  border-radius: 6px;
  padding: 10px 12px;
}

.section-title {
  font-size: 10px;
  font-weight: 700;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 9px;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 3px;
  margin-bottom: 7px;
}
.field:last-child { margin-bottom: 0; }

label {
  font-size: 10px;
  color: #9ca3af;
}

input[type="number"], select, textarea {
  background: #1f2937;
  border: 1px solid #374151;
  border-radius: 4px;
  color: #e5e7eb;
  font-size: 12px;
  padding: 5px 8px;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}
input[type="number"]:focus, select:focus, textarea:focus {
  border-color: #34d399;
}
textarea {
  font-family: 'Courier New', monospace;
  font-size: 10px;
  height: 130px;
  resize: vertical;
}
select option { background: #1f2937; }

.row2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.radio-group {
  display: flex;
  gap: 16px;
  align-items: center;
  padding: 4px 0;
}
.radio-option {
  display: flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
}
.radio-option input { width: auto; accent-color: #34d399; }
.radio-option span { font-size: 12px; color: #d1d5db; }

.btn {
  border: none;
  border-radius: 5px;
  padding: 9px 0;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  width: 100%;
  transition: filter 0.15s;
}
.btn:hover { filter: brightness(1.1); }
.btn-primary { background: #34d399; color: #111827; }
.btn-outline {
  background: transparent;
  border: 1px solid #34d399;
  color: #34d399;
}

.error {
  font-size: 10px;
  color: #f87171;
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.25);
  border-radius: 4px;
  padding: 5px 8px;
  display: none;
}
.error.show { display: block; }

.sample-link {
  font-size: 10px;
  color: #34d399;
  cursor: pointer;
  text-decoration: underline;
  text-align: right;
  margin-top: 3px;
}

/* ---- Main panel ---- */
.main {
  display: grid;
  grid-template-rows: 1fr 1fr;
  overflow: hidden;
}

.preview-panel {
  position: relative;
  background: #0d1117;
  border-bottom: 1px solid #374151;
  overflow: hidden;
}
.preview-panel canvas { display: block; width: 100%; height: 100%; }

.panel-label {
  position: absolute;
  top: 9px;
  left: 12px;
  font-size: 10px;
  font-weight: 700;
  color: #4b5563;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  pointer-events: none;
}

.legend {
  position: absolute;
  bottom: 10px;
  left: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  pointer-events: none;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  color: #6b7280;
}
.legend-swatch {
  width: 20px;
  height: 2px;
  border-radius: 1px;
}

.gcode-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.gcode-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 12px;
  background: #1f2937;
  border-bottom: 1px solid #374151;
  flex-shrink: 0;
}
.gcode-header .label {
  font-size: 10px;
  font-weight: 700;
  color: #4b5563;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.gcode-stats {
  font-size: 10px;
  color: #4b5563;
}

#gcodeOutput {
  flex: 1;
  background: #0d1117;
  color: #6ee7b7;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  padding: 10px 12px;
  overflow-y: auto;
  border: none;
  outline: none;
  resize: none;
  white-space: pre;
}
</style>
</head>
<body>
<div class="app">

  <!-- ========== SIDEBAR ========== -->
  <div class="sidebar">
    <div class="app-title">Cylindrical Pillar G-code</div>

    <!-- DXF Input -->
    <div class="section">
      <div class="section-title">Profile — DXF</div>
      <div class="field">
        <label>DXF content</label>
        <textarea id="dxfInput" placeholder="Paste DXF file content here…"></textarea>
      </div>
      <div class="field">
        <label>Axis mapping</label>
        <select id="dxfAxisMap">
          <option value="XZ_YR">DXF X → machine Z &nbsp;|&nbsp; DXF Y → Radius</option>
          <option value="XR_YZ" selected>DXF X → Radius &nbsp;|&nbsp; DXF Y → machine Z</option>
        </select>
      </div>
      <div class="sample-link" onclick="loadSample()">Load sample profile</div>
      <div id="parseError" class="error"></div>
    </div>

    <!-- Cutting params -->
    <div class="section">
      <div class="section-title">Cutting Parameters</div>
      <div class="row2">
        <div class="field">
          <label>Feedrate (mm/min)</label>
          <input type="number" id="feedrate" value="800" min="1">
        </div>
        <div class="field">
          <label>Spindle (RPM)</label>
          <input type="number" id="spindleSpeed" value="12000" min="1">
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Tool radius (mm)</label>
          <input type="number" id="toolRadius" value="3" min="0" step="0.1">
        </div>
        <div class="field">
          <label>Clearance (mm)</label>
          <input type="number" id="clearance" value="5" min="0.1" step="0.5">
        </div>
      </div>
    </div>

    <!-- Rotary params -->
    <div class="section">
      <div class="section-title">Rotary Parameters</div>
      <div class="field">
        <label>Stock radius (mm)</label>
        <input type="number" id="stockRadius" value="50" min="1" step="0.5">
      </div>

      <!-- Rotation mode toggle -->
      <div class="field">
        <label>Rotation mode</label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="rotMode" value="indexed" checked>
            <span>Indexed</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="rotMode" value="continuous">
            <span>Continuous</span>
          </label>
        </div>
      </div>

      <!-- Indexed: stepover only -->
      <div id="indexedFields">
        <div class="field">
          <label>Stepover (°)</label>
          <input type="number" id="stepover" value="5" min="0.1" step="0.5" max="360">
        </div>
      </div>

      <!-- Continuous: engagement parameters -->
      <div id="continuousFields" style="display:none">
        <div class="row2">
          <div class="field">
            <label title="Radial depth of first contact above finish profile">Engagement start (mm)</label>
            <input type="number" id="engagementStart" value="0.5" min="0.01" step="0.05">
          </div>
          <div class="field">
            <label title="Radial depth removed per full 360° rotation">Feed / rev (mm)</label>
            <input type="number" id="feedPerRev" value="0.2" min="0.01" step="0.05">
          </div>
        </div>
        <div class="field">
          <label class="radio-option">
            <input type="checkbox" id="contIncludeFinishing" checked>
            <span>Include finishing pass</span>
          </label>
        </div>
      </div>

      <div class="row2">
        <div class="field">
          <label>4th axis letter</label>
          <select id="rotaryAxis">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
          </select>
        </div>
        <div class="field">
          <label>X mode</label>
          <select id="xMode">
            <option value="radius">Radius</option>
            <option value="diameter">Diameter</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Roughing -->
    <div class="section">
      <div class="section-title">Roughing</div>
      <div class="field">
        <label class="radio-option">
          <input type="checkbox" id="roughingEnabled">
          <span>Enable roughing passes</span>
        </label>
      </div>
      <div id="roughingParams" style="display:none">
        <div class="row2">
          <div class="field">
            <label>Pass depth (mm)</label>
            <input type="number" id="passDepth" value="2" min="0.1" step="0.1">
          </div>
          <div class="field">
            <label>Finish allowance (mm)</label>
            <input type="number" id="finishAllowance" value="0.5" min="0" step="0.1">
          </div>
        </div>
        <div class="field">
          <label class="radio-option">
            <input type="checkbox" id="includeFinishing" checked>
            <span>Include finishing pass</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Approach -->
    <div class="section">
      <div class="section-title">Tool Approach</div>
      <div class="field">
        <label>Direction</label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="approach" value="radial" checked>
            <span>Radial (side)</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="approach" value="axial">
            <span>Axial (end)</span>
          </label>
        </div>
      </div>
      <div class="field" id="axialEntryField" style="display:none">
        <label>Enter from</label>
        <select id="axialEntry">
          <option value="zmin">Profile Z-start (low Z end)</option>
          <option value="zmax">Profile Z-end (high Z end)</option>
        </select>
      </div>
    </div>

    <button class="btn btn-primary" onclick="generate()">Generate G-code</button>
    <button class="btn btn-outline" onclick="copyGCode()" id="copyBtn">Copy G-code</button>
  </div>

  <!-- ========== MAIN ========== -->
  <div class="main">
    <div class="preview-panel">
      <div class="panel-label">Profile Preview</div>
      <canvas id="previewCanvas"></canvas>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-swatch" style="background:#34d399"></div>
          <span>Finished profile</span>
        </div>
        <div class="legend-item">
          <div class="legend-swatch" style="background:#fbbf24; border-top: 1px dashed #fbbf24; height:0"></div>
          <span>Tool centre path</span>
        </div>
        <div class="legend-item">
          <div class="legend-swatch" style="background:#374151; border-top: 1px dashed #374151; height:0"></div>
          <span>Stock</span>
        </div>
      </div>
    </div>

    <div class="gcode-panel">
      <div class="gcode-header">
        <span class="label">G-code Output</span>
        <span class="gcode-stats" id="gcodeStats"></span>
      </div>
      <textarea id="gcodeOutput" readonly></textarea>
    </div>
  </div>
</div>

<script>
// ============================================================
// DXF PARSER  — LWPOLYLINE + old POLYLINE/VERTEX with bulge
// Returns raw DXF vertices: [[dxf_x, dxf_y, bulge], ...]
// ============================================================
function parseDXF(text) {
  const raw = text.replace(/\r\n|\r/g, '\n').split('\n').map(l => l.trim()).filter(l => l !== '');

  const pairs = [];
  for (let i = 0; i + 1 < raw.length; i += 2) {
    const code = parseInt(raw[i], 10);
    if (isNaN(code)) { i -= 1; continue; }
    pairs.push({ code, value: raw[i + 1] });
  }

  const polylines = [];

  for (let j = 0; j < pairs.length; j++) {
    // ---- LWPOLYLINE ----
    if (pairs[j].code === 0 && pairs[j].value === 'LWPOLYLINE') {
      const rawVerts = [];
      let px = null, closed = false;
      for (let k = j + 1; k < pairs.length; k++) {
        const { code, value } = pairs[k];
        if (code === 0) break;
        if (code === 70) closed = (parseInt(value) & 1) === 1;
        if (code === 10) { px = parseFloat(value); }
        else if (code === 20 && px !== null) {
          rawVerts.push([px, parseFloat(value), 0]);
          px = null;
        } else if (code === 42 && rawVerts.length > 0) {
          rawVerts[rawVerts.length - 1][2] = parseFloat(value);
        }
      }
      if (closed && rawVerts.length > 1) rawVerts.push([...rawVerts[0]]);
      if (rawVerts.length >= 2) polylines.push(rawVerts);
    }

    // ---- POLYLINE / VERTEX ----
    if (pairs[j].code === 0 && pairs[j].value === 'POLYLINE') {
      const rawVerts = [];
      for (let k = j + 1; k < pairs.length; k++) {
        if (pairs[k].code === 0 && pairs[k].value === 'SEQEND') break;
        if (pairs[k].code === 0 && pairs[k].value === 'VERTEX') {
          let vx = null, vy = null, vb = 0;
          for (let m = k + 1; m < pairs.length; m++) {
            if (pairs[m].code === 0) break;
            if (pairs[m].code === 10) vx = parseFloat(pairs[m].value);
            if (pairs[m].code === 20) vy = parseFloat(pairs[m].value);
            if (pairs[m].code === 42) vb = parseFloat(pairs[m].value);
          }
          if (vx !== null && vy !== null) rawVerts.push([vx, vy, vb]);
        }
      }
      if (rawVerts.length >= 2) polylines.push(rawVerts);
    }
  }
  return polylines;
}

// ============================================================
// AXIS MAPPING — normalise DXF coords to [machineZ, radius, bulge]
// abs(radius): profiles drawn on the left (negative X) work correctly.
// Note: abs() is a reflection of the radius axis — this reverses arc
// direction, which is handled in buildSegments via cross-product.
// ============================================================
function applyAxisMapping(rawVerts, mode) {
  return rawVerts.map(([a, b, bulge]) =>
    mode === 'XZ_YR'
      ? [a, Math.abs(b), bulge]
      : [b, Math.abs(a), bulge]
  );
}

// ============================================================
// BUILD SEGMENTS — convert [Z, R, bulge] vertices to segment objects
//
// Line:  { type:'line', z1,r1, z2,r2 }
// Arc:   { type:'arc',  z1,r1, z2,r2, cz,cr, R, ccw }
//          ccw: true → G3, false → G2
//          Direction determined by cross-product in machine XZ space
//          (correctly handles DXF→machine axis reflections).
// ============================================================
function buildSegments(verts) {
  const segs = [];
  for (let i = 0; i < verts.length - 1; i++) {
    const [z1, r1, b] = verts[i];
    const [z2, r2]    = verts[i + 1];

    if (Math.abs(b) < 1e-9) {
      segs.push({ type: 'line', z1, r1, z2, r2 });
      continue;
    }

    // Compute arc center in machine (Z, R) space from bulge
    const chordLen = Math.hypot(z2 - z1, r2 - r1);
    if (chordLen < 1e-12) continue;
    const theta   = 4 * Math.atan(Math.abs(b));
    const arcR    = chordLen / (2 * Math.sin(theta / 2));
    const mz = (z1 + z2) / 2, mr = (r1 + r2) / 2;
    // Left perpendicular of chord in machine (Z, R) space
    const lnz = -(r2 - r1) / chordLen;
    const lnr =  (z2 - z1) / chordLen;
    const distMC = Math.sqrt(Math.max(0, arcR * arcR - (chordLen / 2) ** 2));
    // sign(b): b>0 (DXF CCW) → center to the left in DXF space
    // After abs(radius) reflection this may flip, but cross-product corrects direction.
    const s  = Math.sign(b);
    const cz = mz + s * lnz * distMC;
    const cr = mr + s * lnr * distMC;

    // Determine arc direction in machine XZ plane (X=R, Z=Z), viewed from +Y.
    // Cross product Y component of (center→start) × (center→end):
    //   v1=(r1-cr, z1-cz), v2=(r2-cr, z2-cz)
    //   Y = v1.X * v2.Z - v1.Z * v2.X
    //   Y > 0 → CCW → G3; Y < 0 → CW → G2
    const v1x = r1 - cr, v1z = z1 - cz;
    const v2x = r2 - cr, v2z = z2 - cz;
    const cross = v1x * v2z - v1z * v2x;
    segs.push({ type: 'arc', z1, r1, z2, r2, cz, cr, R: arcR, ccw: cross > 0 });
  }
  return segs;
}

// ============================================================
// OFFSET SEGMENTS — left-side tool radius compensation
//
// Lines: translate endpoints by toolRadius along left normal.
// Arcs:  same center, adjust radius:
//   CCW (G3): left side = outside → R' = R + toolRadius
//   CW  (G2): left side = inside  → R' = R - toolRadius
//   Endpoint positions projected onto offset arc.
//   Degenerate arcs (R' ≤ 0) are dropped.
// After computing raw offsets, fixOffsetJunctions() trims overlapping
// adjacent pairs to their exact geometric intersection, removing loops.
// ============================================================

// --- Geometric helpers (used only by fixOffsetJunctions) ---

function _llIntersect(z1, r1, z2, r2, z3, r3, z4, r4) {
  // Infinite-line intersection; returns {z, r} or null
  const dz1 = z2-z1, dr1 = r2-r1, dz2 = z4-z3, dr2 = r4-r3;
  const det = dz1*dr2 - dr1*dz2;
  if (Math.abs(det) < 1e-12) return null;
  const t = ((z3-z1)*dr2 - (r3-r1)*dz2) / det;
  return { z: z1 + t*dz1, r: r1 + t*dr1 };
}

function _lcIntersect(z1, r1, z2, r2, cz, cr, R) {
  // Line segment direction vs circle; returns array of {z, r}
  const dz = z2-z1, dr = r2-r1;
  const fz = z1-cz, fr = r1-cr;
  const a = dz*dz + dr*dr;
  if (a < 1e-24) return [];
  const b = 2*(dz*fz + dr*fr);
  const c = fz*fz + fr*fr - R*R;
  const disc = b*b - 4*a*c;
  if (disc < 0) return [];
  const sq = Math.sqrt(Math.max(0, disc));
  return [(-b-sq)/(2*a), (-b+sq)/(2*a)].map(t => ({ z: z1+t*dz, r: r1+t*dr }));
}

function _ccIntersect(cz1, cr1, R1, cz2, cr2, R2) {
  // Circle-circle intersection; returns array of {z, r}
  const d = Math.hypot(cz2-cz1, cr2-cr1);
  if (d > R1+R2+1e-9 || d < Math.abs(R1-R2)-1e-9 || d < 1e-12) return [];
  const a = (R1*R1 - R2*R2 + d*d) / (2*d);
  const h2 = R1*R1 - a*a;
  if (h2 < 0) return [];
  const h  = Math.sqrt(Math.max(0, h2));
  const mz = cz1 + a*(cz2-cz1)/d, mr = cr1 + a*(cr2-cr1)/d;
  if (h < 1e-9) return [{ z: mz, r: mr }];
  const px = h*(cr2-cr1)/d, py = h*(cz2-cz1)/d;
  return [{ z: mz+px, r: mr-py }, { z: mz-px, r: mr+py }];
}

function _nearest(pts, z, r) {
  return pts.reduce((best, p) =>
    Math.hypot(p.z-z, p.r-r) < Math.hypot(best.z-z, best.r-r) ? p : best);
}

// Snap a point onto a segment's underlying geometry (arc circle or line — line is already on it)
function _snapToSeg(seg, iz, ir) {
  if (seg.type !== 'arc') return { z: iz, r: ir };
  const d = Math.hypot(iz-seg.cz, ir-seg.cr);
  if (d < 1e-9) return { z: iz, r: ir };
  return { z: seg.cz + seg.R*(iz-seg.cz)/d, r: seg.cr + seg.R*(ir-seg.cr)/d };
}

// Fix junctions between consecutive offset segments by trimming both to their intersection.
// Handles line-line, line-arc, arc-line, arc-arc cases.
function fixOffsetJunctions(segs) {
  if (segs.length < 2) return segs;
  const out = segs.map(s => ({...s}));

  for (let i = 0; i < out.length - 1; i++) {
    const A = out[i], B = out[i+1];
    const gapD = Math.hypot(A.z2 - B.z1, A.r2 - B.r1);
    if (gapD < 1e-6) continue; // already touching

    // Midpoint as "expected junction"
    const jz = (A.z2 + B.z1) / 2, jr = (A.r2 + B.r1) / 2;

    // Collect intersection candidates between the underlying infinite curves
    let cands = [];
    if      (A.type === 'line' && B.type === 'line') { const p = _llIntersect(A.z1,A.r1,A.z2,A.r2, B.z1,B.r1,B.z2,B.r2); if (p) cands = [p]; }
    else if (A.type === 'line' && B.type === 'arc' ) { cands = _lcIntersect(A.z1,A.r1,A.z2,A.r2, B.cz,B.cr,B.R); }
    else if (A.type === 'arc'  && B.type === 'line') { cands = _lcIntersect(B.z1,B.r1,B.z2,B.r2, A.cz,A.cr,A.R); }
    else                                              { cands = _ccIntersect(A.cz,A.cr,A.R, B.cz,B.cr,B.R); }

    if (!cands.length) continue;
    const pt = cands.length === 1 ? cands[0] : _nearest(cands, jz, jr);

    // Reject if the junction fix is unreasonably far (> 2× longest segment + gap)
    const maxLen = 2 * Math.max(
      Math.hypot(A.z2-A.z1, A.r2-A.r1),
      Math.hypot(B.z2-B.z1, B.r2-B.r1)) + gapD;
    if (Math.hypot(pt.z-jz, pt.r-jr) > maxLen) continue;

    // Snap to arc circle to keep G2/G3 math exact
    const pa = _snapToSeg(A, pt.z, pt.r);
    const pb = _snapToSeg(B, pt.z, pt.r);
    // Use the A-snapped point for A's end; B-snapped for B's start
    A.z2 = pa.z; A.r2 = pa.r;
    B.z1 = pb.z; B.r1 = pb.r;
  }

  // Drop degenerate segments that collapsed to zero length after trimming
  return out.filter(s => Math.hypot(s.z2-s.z1, s.r2-s.r1) > 1e-6);
}

function offsetSegments(segs, toolRadius) {
  if (toolRadius === 0) return segs.map(s => ({ ...s }));
  const raw = [];
  for (const seg of segs) {
    if (seg.type === 'line') {
      const dz = seg.z2 - seg.z1, dr = seg.r2 - seg.r1;
      const len = Math.hypot(dz, dr);
      if (len < 1e-12) continue;
      const nz = -dr / len, nr = dz / len; // left normal
      raw.push({
        type: 'line',
        z1: seg.z1 + toolRadius * nz, r1: seg.r1 + toolRadius * nr,
        z2: seg.z2 + toolRadius * nz, r2: seg.r2 + toolRadius * nr,
      });
    } else {
      const R2 = seg.ccw ? seg.R + toolRadius : seg.R - toolRadius;
      if (R2 <= 0) continue; // arc collapses — skip
      const n1z = (seg.z1 - seg.cz) / seg.R, n1r = (seg.r1 - seg.cr) / seg.R;
      const n2z = (seg.z2 - seg.cz) / seg.R, n2r = (seg.r2 - seg.cr) / seg.R;
      raw.push({
        type: 'arc',
        z1: seg.cz + R2 * n1z, r1: seg.cr + R2 * n1r,
        z2: seg.cz + R2 * n2z, r2: seg.cr + R2 * n2r,
        cz: seg.cz, cr: seg.cr, R: R2, ccw: seg.ccw,
      });
    }
  }
  return fixOffsetJunctions(raw);
}

// Reverse a segment list for traversal in the opposite direction.
function reverseSegments(segs) {
  return [...segs].reverse().map(seg => {
    if (seg.type === 'line') {
      return { type: 'line', z1: seg.z2, r1: seg.r2, z2: seg.z1, r2: seg.r1 };
    } else {
      return {
        type: 'arc',
        z1: seg.z2, r1: seg.r2, z2: seg.z1, r2: seg.r1,
        cz: seg.cz, cr: seg.cr, R: seg.R,
        ccw: !seg.ccw, // reverse direction
      };
    }
  });
}

// ============================================================
// PROFILE TESSELLATION (used by continuous mode)
// ============================================================
// Returns array of [z, r] from an already-offset segment list, sampled at ≤ stepMm resolution.
function tessellateSegments(segs, stepMm) {
  const pts = [];
  for (const seg of segs) {
    if (seg.type === 'line') {
      const d = Math.hypot(seg.z2 - seg.z1, seg.r2 - seg.r1);
      const n = Math.max(1, Math.ceil(d / stepMm));
      for (let i = 0; i <= n; i++) {
        pts.push([seg.z1 + (i/n)*(seg.z2-seg.z1), seg.r1 + (i/n)*(seg.r2-seg.r1)]);
      }
    } else {
      // Arc in Z-R plane: centre (cz, cr), radius R, from (z1,r1) to (z2,r2)
      const sa = Math.atan2(seg.r1 - seg.cr, seg.z1 - seg.cz);
      let ea   = Math.atan2(seg.r2 - seg.cr, seg.z2 - seg.cz);
      let delta = ea - sa;
      if ( seg.ccw && delta < 0) delta += 2 * Math.PI;
      if (!seg.ccw && delta > 0) delta -= 2 * Math.PI;
      const arcLen = Math.abs(seg.R * delta);
      const n = Math.max(4, Math.ceil(arcLen / stepMm));
      for (let i = 0; i <= n; i++) {
        const theta = sa + (i/n) * delta;
        pts.push([seg.cz + seg.R * Math.cos(theta), seg.cr + seg.R * Math.sin(theta)]);
      }
    }
  }
  // Deduplicate consecutive coincident points
  return pts.filter((p, i) =>
    i === 0 || Math.hypot(p[0]-pts[i-1][0], p[1]-pts[i-1][1]) > 1e-6);
}

// ============================================================
// CONTINUOUS-MODE G-CODE GENERATOR
// ============================================================
// Strategy: boustrophedon Z traversal (forward/reverse alternating) while A rotates
// continuously. Angular step = 2·arcsin(toolR / minR) guarantees no surface gaps.
// Depth spirals from engagementStart → 0 over nRoughRevs full A revolutions.
function generateContinuousGCode(params, segs) {
  const {
    feedrate, spindleSpeed, toolRadius, clearance, stockRadius,
    rotaryAxis, xMode,
    engagementStart, feedPerRev, contIncludeFinishing,
  } = params;

  const A    = rotaryAxis;
  const xFmt = xMode === 'diameter' ? r => (r*2).toFixed(3) : r => r.toFixed(3);
  const safeX = xMode === 'diameter'
    ? ((stockRadius + clearance)*2).toFixed(3)
    : (stockRadius + clearance).toFixed(3);

  // Build tessellated finish-offset profile (tool centre at finish depth)
  const finOffSegs = offsetSegments(segs, toolRadius);
  if (!finOffSegs.length) return '; ERROR: no valid segments after offset';
  const finPts = tessellateSegments(finOffSegs, 0.5);
  if (!finPts.length) return '; ERROR: empty tessellation';

  const zMin = Math.min(...finPts.map(p => p[0]));
  const zMax = Math.max(...finPts.map(p => p[0]));
  const minR  = Math.min(...finPts.map(p => p[1]));
  const safeZ = (zMax + clearance).toFixed(3);

  // Angular step: 2·arcsin(toolR/minR) degrees covers exactly one tool-diameter strip.
  // Use 90% for slight overlap → no gaps on the tightest part of the profile.
  const coverageDeg = (toolRadius > 0 && minR > toolRadius)
    ? (2 * Math.asin(Math.min(1, toolRadius / minR))) * (180 / Math.PI)
    : 5;
  const angularStep   = Math.min(5, coverageDeg * 0.9);
  const nPassesPerRev = Math.ceil(360 / angularStep);
  const exactStep     = 360 / nPassesPerRev;   // ensures we land exactly on multiples of 360°

  // Roughing: start at engagementStart above finish, reduce by feedPerRev per revolution
  const nRoughRevs    = engagementStart > 0 ? Math.max(1, Math.ceil(engagementStart / feedPerRev)) : 0;
  const nFinishRevs   = contIncludeFinishing ? 1 : 0;
  const totalPasses   = (nRoughRevs + nFinishRevs) * nPassesPerRev;
  // Depth decrease per single Z-traverse pass (linear across all roughing passes)
  const depthDecPerPass = nRoughRevs > 0 ? engagementStart / (nRoughRevs * nPassesPerRev) : 0;

  const arcCount = segs.filter(s => s.type === 'arc').length;

  const L = [];
  const l = s => L.push(s);

  l('; =========================================');
  l('; Cylindrical Pillar G-code — Continuous Mode');
  l(`; Tool radius     : ${toolRadius} mm`);
  l(`; Stock radius    : ${stockRadius} mm`);
  l(`; Engagement start: ${engagementStart} mm`);
  l(`; Feed / rev      : ${feedPerRev} mm`);
  l(`; Angular step    : ${exactStep.toFixed(3)}°  (${nPassesPerRev} passes/rev, coverage ${coverageDeg.toFixed(2)}°)`);
  l(`; Roughing revs   : ${nRoughRevs}  |  Finish : ${contIncludeFinishing}`);
  l(`; Total Z passes  : ${totalPasses}`);
  l(`; Profile pts     : ${finPts.length} (tessellated from ${segs.length - arcCount}L + ${arcCount}A)`);
  l('; =========================================');
  l('');
  l('G21          ; metric');
  l('G90          ; absolute');
  l('G94          ; feed per minute');
  l('G18          ; XZ plane');
  l(`S${spindleSpeed} M3    ; spindle on`);
  l(`G0 X${safeX} Z${safeZ} ${A}0.000  ; safe home`);
  l('');

  // Radial approach to first point at full engagement depth
  const firstPt = finPts[0];
  l(`G0 Z${firstPt[0].toFixed(3)} X${safeX}  ; position to profile start`);
  l(`G1 X${xFmt(firstPt[1] + engagementStart)} F${feedrate}  ; radial plunge to engagement`);
  l('');

  let currentA = 0;
  let dir      = 1;  // +1 = forward (pts[0]→pts[N]), -1 = reverse

  for (let passIdx = 0; passIdx < totalPasses; passIdx++) {
    const isFinish = passIdx >= nRoughRevs * nPassesPerRev;
    const aStart   = currentA;
    const aEnd     = currentA + exactStep;

    // Depth offset at the start and end of this Z traverse (depth changes linearly across the pass)
    const depthStart = isFinish ? 0 : Math.max(0, engagementStart - passIdx       * depthDecPerPass);
    const depthEnd   = isFinish ? 0 : Math.max(0, engagementStart - (passIdx + 1) * depthDecPerPass);

    // Label at each revolution boundary
    if (passIdx % nPassesPerRev === 0) {
      const revLabel = isFinish ? 'Finish revolution' :
        `Rough rev ${Math.floor(passIdx / nPassesPerRev) + 1}/${nRoughRevs}`;
      l(`; === ${revLabel}  A ${aStart.toFixed(1)}°  depth ${depthStart.toFixed(3)}→${Math.max(0, engagementStart - Math.min(nRoughRevs * nPassesPerRev, passIdx + nPassesPerRev) * depthDecPerPass).toFixed(3)} ===`);
    }

    const pts = dir === 1 ? finPts : [...finPts].reverse();

    pts.forEach((pt, i) => {
      if (passIdx === 0 && i === 0) return;  // already positioned there by the approach move
      const t     = i / Math.max(1, pts.length - 1);
      const a     = aStart + t * exactStep;
      // Depth interpolates continuously across the Z traverse: smooth spiral in X
      const depth = depthStart + t * (depthEnd - depthStart);
      l(`G1 Z${pt[0].toFixed(3)} X${xFmt(pt[1] + depth)} ${A}${a.toFixed(3)} F${feedrate}`);
    });

    currentA = aEnd;
    dir = -dir;
  }

  l('');
  l('; =========================================');
  l('M5           ; spindle off');
  l(`G0 X${safeX} Z${safeZ}`);
  l('M30');

  return L.join('\n');
}

// ============================================================
// G-CODE GENERATOR
// ============================================================
function generateGCode(params, segs) {
  // Dispatch to continuous mode if selected
  if (params.continuousMode) return generateContinuousGCode(params, segs);

  const {
    feedrate, spindleSpeed, toolRadius, clearance,
    stockRadius, stepover, rotaryAxis, xMode,
    approachType, axialEntry,
    roughingEnabled, passDepth, finishAllowance, includeFinishing,
  } = params;

  const A     = rotaryAxis;
  const xFmt  = xMode === 'diameter' ? r => (r * 2).toFixed(3) : r => r.toFixed(3);
  const safeX = xMode === 'diameter'
    ? ((stockRadius + clearance) * 2).toFixed(3)
    : (stockRadius + clearance).toFixed(3);

  const allZ  = segs.flatMap(s => [s.z1, s.z2]);
  const zMin  = Math.min(...allZ);
  const zMax  = Math.max(...allZ);
  const safeZ = (zMax + clearance).toFixed(3);

  const numAngles     = Math.ceil(360 / stepover);
  const enterFromZMin = axialEntry === 'zmin';
  const entryZ = (enterFromZMin ? zMin - clearance : zMax + clearance).toFixed(3);
  const exitZ  = (enterFromZMin ? zMax + clearance : zMin - clearance).toFixed(3);

  // ---- Roughing pass count ----
  // The deepest point of the profile needs the most roughing passes.
  const minProfileR = Math.min(...segs.flatMap(s => [s.r1, s.r2]));
  const maxDepth    = stockRadius - minProfileR - (roughingEnabled ? finishAllowance : 0);
  const N = roughingEnabled ? Math.max(0, Math.ceil(maxDepth / passDepth)) : 0;

  const arcCount = segs.filter(s => s.type === 'arc').length;

  const L = [];
  const l = s => L.push(s);

  l('; =========================================');
  l('; Cylindrical Pillar G-code');
  l(`; Tool radius    : ${toolRadius} mm`);
  l(`; Stock radius   : ${stockRadius} mm`);
  l(`; Stepover       : ${stepover}°  (${numAngles} angles)`);
  l(`; Segments       : ${segs.length - arcCount} lines + ${arcCount} arcs`);
  if (roughingEnabled) {
    l(`; Roughing       : ${N} pass${N !== 1 ? 'es' : ''} × ${passDepth} mm  |  finish allowance ${finishAllowance} mm`);
  }
  l(`; Approach       : ${approachType === 'radial' ? 'Radial (side)' : `Axial (${enterFromZMin ? 'low-Z' : 'high-Z'} entry)`}`);
  l(`; X mode         : ${xMode}`);
  l('; =========================================');
  l('');
  l('G21          ; metric');
  l('G90          ; absolute');
  l('G94          ; feed per minute');
  l('G18          ; XZ plane (for G2/G3 arcs)');
  l(`S${spindleSpeed} M3    ; spindle on`);
  l(`G0 X${safeX} Z${safeZ} ${A}0.000  ; safe home`);
  l('');

  // ---- Emit one segment ----
  function emitSeg(seg) {
    if (seg.type === 'line') {
      l(`G1 Z${seg.z2.toFixed(3)} X${xFmt(seg.r2)} F${feedrate}`);
    } else {
      const I   = (seg.cr - seg.r1).toFixed(3);
      const K   = (seg.cz - seg.z1).toFixed(3);
      const cmd = seg.ccw ? 'G3' : 'G2';
      l(`${cmd} Z${seg.z2.toFixed(3)} X${xFmt(seg.r2)} I${I} K${K} F${feedrate}`);
    }
  }

  // ---- Emit one profile pass (approach → follow → retract) ----
  function emitPass(offS, label) {
    const trav = (approachType === 'axial' && !enterFromZMin)
      ? reverseSegments(offS)
      : offS;
    const first = trav[0];

    l(`; ${label}`);
    if (approachType === 'radial') {
      l(`G0 Z${first.z1.toFixed(3)} X${safeX}`);
      l(`G1 X${xFmt(first.r1)} F${feedrate}  ; radial plunge`);
      for (const seg of trav) emitSeg(seg);
      l(`G0 X${safeX}  ; retract`);
    } else {
      l(`G0 X${xFmt(first.r1)} Z${entryZ}`);
      l(`G1 Z${first.z1.toFixed(3)} F${feedrate}  ; axial entry`);
      for (const seg of trav) emitSeg(seg);
      l(`G1 Z${exitZ} F${feedrate}  ; axial exit`);
      l(`G0 X${safeX}  ; retract`);
    }
  }

  // ---- Main loop — one A-axis angle at a time ----
  for (let ai = 0; ai < numAngles; ai++) {
    const angle = (ai * stepover).toFixed(3);
    l(`; === Angle ${String(ai + 1).padStart(3)} / ${numAngles}  |  ${A} = ${angle}° ===`);
    l(`G0 ${A}${angle}`);

    // Roughing passes: k = 1 (outermost) … N (innermost, leaves finishAllowance)
    for (let k = 1; k <= N; k++) {
      const addlOffset = finishAllowance + (N - k) * passDepth;
      const roughSegs  = offsetSegments(segs, toolRadius + addlOffset);
      if (roughSegs.length) {
        emitPass(roughSegs, `Roughing pass ${k}/${N}  offset +${addlOffset.toFixed(3)} mm`);
      }
    }

    // Finishing pass
    if (!roughingEnabled || includeFinishing) {
      const finSegs = offsetSegments(segs, toolRadius);
      if (finSegs.length) {
        emitPass(finSegs, roughingEnabled ? 'Finishing pass' : 'Pass');
      }
    }

    l('');
  }

  l('; =========================================');
  l('M5           ; spindle off');
  l(`G0 X${safeX} Z${safeZ}`);
  l('M30');

  return L.join('\n');
}

// ============================================================
// CANVAS PREVIEW — draws actual arc curves (not tessellated lines)
// ============================================================
function resizeCanvas(canvas) {
  const r = canvas.parentElement.getBoundingClientRect();
  canvas.width  = r.width;
  canvas.height = r.height;
}

// roughingSegArrays: array of segment arrays, one per roughing pass (outermost first)
function drawPreview(canvas, segs, offSegs, stockRadius, roughingSegArrays) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  if (!segs || !segs.length) {
    ctx.fillStyle = '#374151';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Paste DXF content and click Generate to preview', W / 2, H / 2);
    return;
  }

  const roughArrays = roughingSegArrays || [];

  // Compute bounds from all segment endpoints, arc centres, and roughing paths
  const pts = segs.flatMap(s =>
    s.type === 'arc'
      ? [[s.z1, s.r1], [s.z2, s.r2], [s.cz, s.cr]]
      : [[s.z1, s.r1], [s.z2, s.r2]]
  );
  const offPts = offSegs.flatMap(s => [[s.z1, s.r1], [s.z2, s.r2]]);
  const roughPts = roughArrays.flatMap(arr => arr.flatMap(s => [[s.z1, s.r1], [s.z2, s.r2]]));
  const allPts = [...pts, ...offPts, ...roughPts];
  const zlo = Math.min(...allPts.map(p => p[0]));
  const zhi = Math.max(...allPts.map(p => p[0]));
  const rlo = Math.min(Math.min(...allPts.map(p => p[1])), 0);
  const rhi = Math.max(Math.max(...allPts.map(p => p[1])), stockRadius * 1.05);

  const pad    = 48;
  const scaleX = (W - pad * 2) / (zhi - zlo || 1);
  const scaleY = (H - pad * 2) / (rhi - rlo || 1);
  const sc     = Math.min(scaleX, scaleY);
  const ox     = pad + ((W - pad * 2) - (zhi - zlo) * sc) / 2;
  const oy     = pad + ((H - pad * 2) - (rhi - rlo) * sc) / 2;

  const tx = z => ox + (z - zlo) * sc;
  const ty = r => H - oy - (r - rlo) * sc;

  // Helper: draw a segment on the canvas
  function drawSeg(seg, isFirst) {
    if (isFirst) ctx.moveTo(tx(seg.z1), ty(seg.r1));
    if (seg.type === 'line') {
      ctx.lineTo(tx(seg.z2), ty(seg.r2));
    } else {
      const sa = Math.atan2(-(seg.r1 - seg.cr), seg.z1 - seg.cz);
      const ea = Math.atan2(-(seg.r2 - seg.cr), seg.z2 - seg.cz);
      const R  = seg.R * sc;
      ctx.arc(tx(seg.cz), ty(seg.cr), R, sa, ea, !seg.ccw);
    }
  }

  // Stock radius
  ctx.strokeStyle = '#374151';
  ctx.lineWidth   = 1;
  ctx.setLineDash([5, 5]);
  ctx.beginPath();
  ctx.moveTo(tx(zlo - 3), ty(stockRadius));
  ctx.lineTo(tx(zhi + 3), ty(stockRadius));
  ctx.stroke();
  ctx.setLineDash([]);

  // Z axis baseline
  ctx.strokeStyle = '#1f2937';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.moveTo(0, ty(0)); ctx.lineTo(W, ty(0));
  ctx.stroke();

  // Roughing pass tool-centre paths — graduated colour: outermost (dim) → innermost (brighter)
  // Each pass is a solid line; colour fades from near-stock grey toward amber as passes approach finish
  const N = roughArrays.length;
  roughArrays.forEach((arr, k) => {
    if (!arr.length) return;
    // k=0 outermost → k=N-1 innermost (closest to finish)
    const t = N <= 1 ? 1 : k / (N - 1);              // 0 = outermost, 1 = innermost
    // interpolate: #4b5563 (grey) → #f59e0b (warm amber, distinct from finish amber)
    const r = Math.round(0x4b + t * (0xf5 - 0x4b));
    const g = Math.round(0x55 + t * (0x9e - 0x55));
    const b = Math.round(0x63 + t * (0x0b - 0x63));
    const alpha = 0.35 + t * 0.35;                    // 0.35 → 0.70
    ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.lineWidth   = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    arr.forEach((s, i) => drawSeg(s, i === 0));
    ctx.stroke();
  });
  ctx.setLineDash([]);

  // Finish tool-centre path (offset by toolRadius) — dashed amber
  ctx.strokeStyle = '#fbbf24';
  ctx.lineWidth   = 1.5;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  offSegs.forEach((s, i) => drawSeg(s, i === 0));
  ctx.stroke();
  ctx.setLineDash([]);

  // Profile — solid green
  ctx.strokeStyle = '#34d399';
  ctx.lineWidth   = 2;
  ctx.beginPath();
  segs.forEach((s, i) => drawSeg(s, i === 0));
  ctx.stroke();

  // Vertex dots at DXF vertices
  ctx.fillStyle = '#34d399';
  segs.forEach((s, i) => {
    if (i === 0) { ctx.beginPath(); ctx.arc(tx(s.z1), ty(s.r1), 2.5, 0, Math.PI*2); ctx.fill(); }
    ctx.beginPath(); ctx.arc(tx(s.z2), ty(s.r2), 2.5, 0, Math.PI*2); ctx.fill();
  });

  // Legend (only when depth-band passes are shown)
  const isContinuousPreview = N > 0 && roughArrays.length > 0 &&
    // heuristic: continuous bands are evenly spaced from engagementStart; roughing passes vary
    true; // always show the same legend structure
  if (N > 0) {
    const depthLabel = isContinuousPreview
      ? `Depth bands (${N})`
      : `Roughing (${N} pass${N !== 1 ? 'es' : ''})`;
    const items = [
      { color: '#34d399',              dash: false, label: 'Profile' },
      { color: 'rgba(245,158,11,0.7)', dash: true,  label: depthLabel },
      { color: '#fbbf24',              dash: true,  label: 'Finish path' },
    ];
    ctx.font = '10px sans-serif';
    ctx.textBaseline = 'middle';
    let lx = tx(zlo);
    const ly = ty(rhi) + 10;
    items.forEach(item => {
      ctx.strokeStyle = item.color;
      ctx.lineWidth = 1.5;
      ctx.setLineDash(item.dash ? [4, 3] : []);
      ctx.beginPath();
      ctx.moveTo(lx, ly); ctx.lineTo(lx + 18, ly);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = item.color;
      ctx.textAlign = 'left';
      ctx.fillText(item.label, lx + 22, ly);
      lx += ctx.measureText(item.label).width + 48;
    });
  }

  // Axis labels
  ctx.fillStyle    = '#4b5563';
  ctx.font         = '10px sans-serif';
  ctx.textAlign    = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillText('R', tx(zlo) - 4, ty((rhi + rlo) / 2));
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('Z', tx((zhi + zlo) / 2), H - oy + 4);
}

// ============================================================
// STATE & EVENTS
// ============================================================
let state = { segs: null, offSegs: null, params: null };

document.querySelectorAll('input[name="approach"]').forEach(r =>
  r.addEventListener('change', () => {
    const axial = document.querySelector('input[name="approach"]:checked').value === 'axial';
    document.getElementById('axialEntryField').style.display = axial ? 'block' : 'none';
  })
);

document.getElementById('roughingEnabled').addEventListener('change', function () {
  document.getElementById('roughingParams').style.display = this.checked ? 'block' : 'none';
});

document.querySelectorAll('input[name="rotMode"]').forEach(r =>
  r.addEventListener('change', () => {
    const cont = document.querySelector('input[name="rotMode"]:checked').value === 'continuous';
    document.getElementById('indexedFields').style.display    = cont ? 'none'  : 'block';
    document.getElementById('continuousFields').style.display = cont ? 'block' : 'none';
  })
);

function getParams() {
  const continuousMode = document.querySelector('input[name="rotMode"]:checked').value === 'continuous';
  return {
    feedrate:     parseFloat(document.getElementById('feedrate').value)     || 800,
    spindleSpeed: parseInt(document.getElementById('spindleSpeed').value)    || 12000,
    toolRadius:   parseFloat(document.getElementById('toolRadius').value)    || 0,
    clearance:    parseFloat(document.getElementById('clearance').value)     || 5,
    stockRadius:  parseFloat(document.getElementById('stockRadius').value)   || 50,
    stepover:     parseFloat(document.getElementById('stepover').value)      || 5,
    rotaryAxis:   document.getElementById('rotaryAxis').value,
    xMode:        document.getElementById('xMode').value,
    approachType:      document.querySelector('input[name="approach"]:checked').value,
    axialEntry:        document.getElementById('axialEntry').value,
    dxfAxisMap:        document.getElementById('dxfAxisMap').value,
    // Indexed roughing
    roughingEnabled:   document.getElementById('roughingEnabled').checked,
    passDepth:         parseFloat(document.getElementById('passDepth').value)       || 2,
    finishAllowance:   parseFloat(document.getElementById('finishAllowance').value) || 0.5,
    includeFinishing:  document.getElementById('includeFinishing').checked,
    // Continuous mode
    continuousMode,
    engagementStart:     parseFloat(document.getElementById('engagementStart').value)     || 0.5,
    feedPerRev:          parseFloat(document.getElementById('feedPerRev').value)          || 0.2,
    contIncludeFinishing: document.getElementById('contIncludeFinishing').checked,
  };
}

function generate() {
  const errEl = document.getElementById('parseError');
  errEl.classList.remove('show');

  const dxf = document.getElementById('dxfInput').value.trim();
  if (!dxf) { errEl.textContent = 'Paste DXF content first.'; errEl.classList.add('show'); return; }

  let polys;
  try { polys = parseDXF(dxf); }
  catch (e) { errEl.textContent = 'Parse error: ' + e.message; errEl.classList.add('show'); return; }

  if (!polys.length) {
    errEl.textContent = 'No LWPOLYLINE or POLYLINE found in DXF.';
    errEl.classList.add('show');
    return;
  }

  const params     = getParams();
  const rawPoly    = polys.reduce((a, b) => b.length > a.length ? b : a);
  const mappedVerts = applyAxisMapping(rawPoly, params.dxfAxisMap);
  const segs       = buildSegments(mappedVerts);
  const offSegs    = offsetSegments(segs, params.toolRadius);

  // Build preview segment arrays for depth visualisation
  let roughingSegArrays = [];
  if (params.continuousMode) {
    // Continuous: show gradient bands from engagementStart down to finish
    const nBands = Math.min(8, Math.max(2, Math.ceil(params.engagementStart / params.feedPerRev)));
    for (let k = 0; k < nBands; k++) {
      const offset = params.engagementStart * (1 - k / nBands);
      if (offset > 1e-6) roughingSegArrays.push(offsetSegments(segs, params.toolRadius + offset));
    }
  } else if (params.roughingEnabled) {
    const minProfileR = Math.min(...segs.flatMap(s => [s.r1, s.r2]));
    const maxDepth    = params.stockRadius - minProfileR - params.finishAllowance;
    const N = Math.max(0, Math.ceil(maxDepth / params.passDepth));
    for (let k = 1; k <= N; k++) {
      const addlOffset = params.finishAllowance + (N - k) * params.passDepth;
      roughingSegArrays.push(offsetSegments(segs, params.toolRadius + addlOffset));
    }
  }

  state = { segs, offSegs, params, roughingSegArrays };

  const gcode = generateGCode(params, segs);
  document.getElementById('gcodeOutput').value = gcode;

  const gcodeLines = gcode.split('\n').length;
  const lineSegs   = segs.filter(s => s.type === 'line').length;
  const arcSegs    = segs.filter(s => s.type === 'arc').length;
  let statsExtra = '';
  if (params.continuousMode) {
    const finOffSegs = offsetSegments(segs, params.toolRadius);
    const finPts = tessellateSegments(finOffSegs, 0.5);
    const minR = Math.min(...finPts.map(p => p[1]));
    const covDeg = params.toolRadius > 0 && minR > params.toolRadius
      ? (2 * Math.asin(Math.min(1, params.toolRadius / minR))) * (180 / Math.PI) : 5;
    const step = Math.min(5, covDeg * 0.9);
    const nPPR = Math.ceil(360 / step);
    const nRR  = params.engagementStart > 0 ? Math.max(1, Math.ceil(params.engagementStart / params.feedPerRev)) : 0;
    statsExtra = ` · continuous: ${nRR} rev × ${nPPR} passes/rev = ${(nRR + (params.contIncludeFinishing ? 1 : 0)) * nPPR} Z passes`;
  } else {
    const passes = Math.ceil(360 / params.stepover);
    const roughN = roughingSegArrays.length;
    statsExtra = ` · ${passes} passes` + (roughN ? ` · ${roughN} roughing` : '');
  }
  document.getElementById('gcodeStats').textContent =
    `${gcodeLines} lines · ${rawPoly.length} DXF pts → ${lineSegs}L + ${arcSegs}A segments` + statsExtra;

  const canvas = document.getElementById('previewCanvas');
  resizeCanvas(canvas);
  drawPreview(canvas, segs, offSegs, params.stockRadius, roughingSegArrays);
}

async function copyGCode() {
  const txt = document.getElementById('gcodeOutput').value;
  if (!txt) return;
  try {
    await navigator.clipboard.writeText(txt);
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy G-code'; }, 1600);
  } catch (_) {}
}

  const canvas = document.getElementById('previewCanvas');
